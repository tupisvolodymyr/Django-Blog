<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Персональний Блог{% endblock %}</title>

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22><rect width=%2224%22 height=%2224%22 fill=%22black%22/><path d=%22M6 6L18 18M18 6L6 18%22 stroke=%22white%22 stroke-width=%222%22/><rect x=%2210%22 y=%2210%22 width=%224%22 height=%224%22 fill=%22white%22/></svg>">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* 1. ГЛОБАЛЬНІ НАЛАШТУВАННЯ */
        html, body {
            background-color: #ffffff !important;
            color: #000000 !important;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-image: linear-gradient(#f9f9f9 1px, transparent 1px),
                              linear-gradient(90deg, #f9f9f9 1px, transparent 1px);
            background-size: 50px 50px;
            background-attachment: fixed;
        }

        /* 2. УНІВЕРСАЛЬНА СИСТЕМНА КНОПКА */
        .btn-minimal,
        .btn-outline-dark.rounded-0,
        button.btn-minimal-submit,
        .nav-btn-custom {
            display: inline-flex !important;
            align-items: center !important;
            justify-content: center !important;
            height: 40px !important;
            padding: 0 20px !important;
            background-color: #000000;
            color: #ffffff !important;
            border: 1px solid #000000;
            border-radius: 0 !important;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            text-decoration: none !important;
            transition: all 0.2s ease;
            cursor: pointer;
            line-height: 1 !important;
            box-sizing: border-box;
            white-space: nowrap;
        }

        .btn-outline-dark.rounded-0 {
            background-color: transparent !important;
            color: #000000 !important;
        }

        .btn-minimal:hover {
            background-color: #333333;
            color: #ffffff !important;
        }

        /* 3. НАВІГАЦІЯ */
        .navbar {
            background-color: #ffffff !important;
            border-bottom: 2px solid #000000;
            padding: 10px 0;
            z-index: 1000;
            position: sticky;
            top: 0;
        }

        /* ЛОГОТИП-КНОПКА */
        .logo-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px; height: 40px;
            border: 2px solid #000000;
            background-color: #000000;
            text-decoration: none !important;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        .logo-symbol {
            width: 22px; height: 22px;
        }

        .logo-symbol-path {
            fill: none;
            stroke: #ffffff;
            stroke-width: 2.5;
            stroke-linecap: square;
            transition: stroke 0.2s ease;
        }

        .logo-symbol-rect {
            fill: #ffffff;
            transition: fill 0.2s ease;
        }

        .logo-btn:hover {
            background-color: transparent;
        }

        .logo-btn:hover .logo-symbol-path {
            stroke: #000000;
        }

        .logo-btn:hover .logo-symbol-rect {
            fill: #000000;
        }

        .nav-link-text {
            color: #000000 !important;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            font-weight: 600;
            text-decoration: none;
            padding: 0 15px;
            display: inline-flex;
            align-items: center;
            height: 40px;
            border: none;
            background: none;
            cursor: pointer;
        }

        .nav-avatar {
            width: 34px;
            height: 34px;
            object-fit: cover;
            border: 2px solid #000000;
            display: block;
            margin-left: 10px;
            transition: transform 0.2s ease;
        }

        .nav-avatar:hover {
            transform: scale(1.1);
        }

        /* 4. КОНТЕНТ ТА ФУТЕР */
        .content-wrapper {
            min-height: calc(100vh - 160px);
        }

        footer {
            border-top: 2px solid #000000;
            padding: 40px 0;
            background: #ffffff;
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            font-weight: 600;
        }

        *:focus { outline: none !important; box-shadow: none !important; }
        a { color: inherit !important; text-decoration: none !important; }
        .fw-black { font-weight: 900; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-md">
    <div class="container">
        <a class="navbar-brand p-0" href="{% url 'post_list' %}">
            <div class="logo-btn">
                <svg class="logo-symbol" viewBox="0 0 24 24">
                    <path class="logo-symbol-path" d="M2 2L22 22M22 2L2 22"/>
                    <rect class="logo-symbol-rect" x="9" y="9" width="6" height="6"/>
                </svg>
            </div>
        </a>

        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <div class="ms-auto d-flex align-items-center flex-wrap">
                {% if user.is_authenticated %}
                    <a class="btn-minimal" href="{% url 'post_new' %}">Додати +</a>

                    <form action="{% url 'logout' %}" method="post" class="m-0 d-inline">
                        {% csrf_token %}
                        <button type="submit" class="nav-link-text">Вийти</button>
                    </form>

                    <a href="{% url 'profile' user.pk %}" class="d-block">
                        {% if user.profile.avatar %}
                            <img src="{{ user.profile.avatar.url }}" class="nav-avatar" alt="профіль">
                        {% else %}
                            <div class="nav-avatar bg-dark d-flex align-items-center justify-content-center text-white fw-bold" style="font-size: 0.7rem;">
                                {{ user.username|slice:":1"|upper }}
                            </div>
                        {% endif %}
                    </a>
                {% else %}
                    <a class="nav-link-text" href="{% url 'login' %}">Вхід</a>
                    <a class="btn-minimal ms-md-2" href="{% url 'register' %}">Створити акаунт</a>
                {% endif %}
            </div>
        </div>
    </div>
</nav>

<div class="content-wrapper">
    {% block content %}{% endblock %}
</div>

<footer class="text-center mt-5">
    <p class="m-0 text-uppercase">ПЕРСОНАЛЬНИЙ БЛОГ &bull; 2026</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
