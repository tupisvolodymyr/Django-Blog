<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — СИСТЕМНА ПОМИЛКА</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #fff;
            color: #000;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            text-transform: uppercase;
        }
        .error-container {
            border: 2px solid #000;
            padding: 4rem;
            max-width: 600px;
            width: 90%;
            text-align: center;
        }
        .error-code {
            font-size: 8rem;
            font-weight: 900;
            line-height: 1;
            letter-spacing: -0.05em;
            margin-bottom: 1rem;
        }
        .error-message {
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            border-top: 2px solid #000;
            padding-top: 1.5rem;
            margin-bottom: 2rem;
        }
        .btn-back {
            display: inline-block;
            background: #000;
            color: #fff;
            text-decoration: none;
            padding: 1rem 2rem;
            font-size: 0.8rem;
            font-weight: 800;
            transition: all 0.3s ease;
        }
        .btn-back:hover {
            background: #fff;
            color: #000;
            box-shadow: inset 0 0 0 2px #000;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <div class="error-message">Сторінку не знайдено / Ресурс відсутній</div>
        <a href="/" class="btn-back">Повернутися на головну</a>
    </div>
</body>
</html>
