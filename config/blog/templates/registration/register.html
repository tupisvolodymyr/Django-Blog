{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center align-items-center" style="min-height: 70vh;">
        <div class="col-md-6 col-lg-5">
            <div class="border border-dark bg-white p-4 p-md-5">
                <h1 class="h2 fw-bold mb-5 text-uppercase text-center" style="letter-spacing: -0.02em;">
                    Реєстрація
                </h1>

                <form method="post">
                    {% csrf_token %}

                    {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-uppercase" style="letter-spacing: 0.1em;">
                            {{ field.label }}
                        </label>
                        <div class="minimal-input-wrapper">
                            {{ field }}
                        </div>
                        {% if field.help_text %}
                            <div class="text-muted mt-1" style="font-size: 0.65rem; line-height: 1.2;">
                                {{ field.help_text|striptags }}
                            </div>
                        {% endif %}
                        {% if field.errors %}
                            <div class="text-danger small mt-1" style="font-size: 0.7rem;">
                                {{ field.errors|striptags }}
                            </div>
                        {% endif %}
                    </div>
                    {% endfor %}

                    <button type="submit" class="btn-minimal w-100 mt-4 py-3">
                        Підтвердити реєстрацію
                    </button>
                </form>

                <div class="mt-5 pt-4 border-top border-dark text-center">
                    <p class="small text-muted text-uppercase mb-2" style="letter-spacing: 0.05em;">Вже є акаунт?</p>
                    <a href="{% url 'login' %}" class="fw-bold text-dark text-decoration-none border-bottom border-dark pb-1 small">
                        УВІЙТИ
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    input[type="text"], input[type="password"], input[type="email"], input[type="text"] {
        width: 100%;
        padding: 10px 15px;
        border: 1px solid #000 !important;
        border-radius: 0 !important;
        font-size: 0.9rem;
    }
    input:focus { background-color: #fcfcfc !important; }
</style>
{% endblock %}
